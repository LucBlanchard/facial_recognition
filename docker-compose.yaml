services:
  api:
    build:
      context: .                    # ← root of the project
      dockerfile: Dockerfile        # ← Dockerfile at the root
    image: face-recognition-api     # ← name of the image
    ports:
      - "5000:5000"

  streamlit:
    build:
      context: ./streamlit          # ← streamlit folder is the context
      dockerfile: Dockerfile        # ← streamlit/Dockerfile
    image: face-recognition-webapp  # ← name of the image
    ports:
      - "8501:8501"
    depends_on:
      - api
    environment:
      - API_URL=http://api:5000